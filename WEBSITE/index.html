<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pahlawan Roleplay UCP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            screens: {
              'xs': '320px',
              'sm': '640px',
              'md': '768px',
              'lg': '1024px',
              'xl': '1280px',
              '2xl': '1536px',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              ph: {
                red: '#dc2626',
                redDark: '#991b1b',
                gold: '#d97706',
                goldLight: '#fbbf24',
                dark: '#0a0a0a',
                panel: '#121212',
                // Auth design tokens
                crimson: {
                  950: '#3f060a',
                  900: '#760c14',
                  800: '#9f121f',
                  700: '#b91422',
                  600: '#d71920',
                  500: '#ef2a2a',
                  400: '#ff5a5f',
                },
                gold: {
                  900: '#78350f',
                  800: '#92400e',
                  700: '#b45309',
                  600: '#d88912',
                  500: '#f59e0b',
                  400: '#fbbf24',
                },
                surface: {
                  deep: 'var(--ph-surface-deep)',
                  base: 'var(--ph-surface-base)',
                  card: 'var(--ph-surface-card)',
                  panel: 'var(--ph-surface-panel)',
                  elevated: 'var(--ph-surface-elevated)',
                  input: 'var(--ph-surface-input)',
                },
              }
            },
            spacing: {
              'safe': 'env(safe-area-inset-bottom)',
            },
            backgroundImage: {
              'grid-pattern': "url(\"data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32' width='32' height='32' fill='none' stroke='rgb(255 255 255 / 0.05)'%3e%3cpath d='M0 .5H31.5V32'/%3e%3c/svg%3e\")",
              'grid-pattern-light': "url(\"data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32' width='32' height='32' fill='none' stroke='rgb(0 0 0 / 0.05)'%3e%3cpath d='M0 .5H31.5V32'/%3e%3c/svg%3e\")",
              'dot-pattern': "url(\"data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' width='24' height='24' fill='none'%3e%3ccircle cx='1' cy='1' r='1' fill='rgb(220 38 38 / 0.18)'/%3e%3c/svg%3e\")",
              'dot-pattern-light': "url(\"data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' width='24' height='24' fill='none'%3e%3ccircle cx='1' cy='1' r='1' fill='rgb(153 27 27 / 0.12)'/%3e%3c/svg%3e\")",
              'diagonal-stripes': "url(\"data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 8 8' width='8' height='8'%3e%3cpath d='M0 8L8 0' stroke='rgb(220 38 38 / 0.05)' stroke-width='1'/%3e%3c/svg%3e\")",
            },
            animation: {
              'float': 'float 6s ease-in-out infinite',
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'auth-fade-in': 'authFadeIn 0.4s ease-out',
              'auth-slide-up': 'authSlideUp 0.4s ease-out',
              'auth-slide-down': 'authSlideDown 0.25s ease-out',
              'auth-scale-in': 'authScaleIn 0.3s ease-out',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              },
              authFadeIn: {
                from: { opacity: '0' },
                to: { opacity: '1' },
              },
              authSlideUp: {
                from: { opacity: '0', transform: 'translateY(12px)' },
                to: { opacity: '1', transform: 'translateY(0)' },
              },
              authSlideDown: {
                from: { opacity: '0', transform: 'translateY(-8px)' },
                to: { opacity: '1', transform: 'translateY(0)' },
              },
              authScaleIn: {
                from: { opacity: '0', transform: 'scale(0.95)' },
                to: { opacity: '1', transform: 'scale(1)' },
              },
            }
          },
        },
      }
    </script>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
<style>
  /* ===== PHRP Design Tokens ===== */
  :root {
    /* --- Brand Palette --- */
    --ph-red-base: #d71920;
    --ph-red-dark: #9f121f;
    --ph-red-soft: #fff1f1;
    --ph-gold-accent: #d88912;
    --ph-crimson-600: var(--ph-red-base);
    --ph-crimson-700: #b91422;
    --ph-crimson-800: var(--ph-red-dark);
    --ph-gold-600: var(--ph-gold-accent);
    --ph-gold-400: #f2a51a;

    /* --- Semantic: Success / Warning / Info --- */
    --ph-success: #16a34a;
    --ph-success-soft: #f0fdf4;
    --ph-success-border: rgba(22, 163, 74, 0.18);
    --ph-warning: #d97706;
    --ph-warning-soft: #fffbeb;
    --ph-warning-border: rgba(216, 137, 18, 0.22);
    --ph-info: #2563eb;
    --ph-info-soft: #eff6ff;
    --ph-info-border: rgba(37, 99, 235, 0.18);

    /* --- Surfaces (Light Mode default) --- */
    --ph-surface-deep: #f8f9fa;
    --ph-surface-base: #ffffff;
    --ph-surface-card: #ffffff;
    --ph-surface-panel: #f8f9fa;
    --ph-surface-input: #fbfaf8;
    --ph-surface-elevated: #ffffff;

    /* --- Borders --- */
    --ph-border-subtle: rgba(15, 23, 42, 0.08);
    --ph-border-default: rgba(15, 23, 42, 0.12);
    --ph-border-focus: rgba(215, 25, 32, 0.34);

    /* --- Text --- */
    --ph-text-primary: #161616;
    --ph-text-secondary: #55565b;
    --ph-text-muted: #7a7c83;
    --ph-text-inverse: #ffffff;

    /* --- Spacing Scale (4px base) --- */
    --ph-space-1: 4px;
    --ph-space-2: 8px;
    --ph-space-3: 12px;
    --ph-space-4: 16px;
    --ph-space-5: 20px;
    --ph-space-6: 24px;
    --ph-space-8: 32px;
    --ph-space-10: 40px;
    --ph-space-12: 48px;
    --ph-space-16: 64px;

    /* --- Radius --- */
    --ph-radius-sm: 6px;
    --ph-radius-input: 10px;
    --ph-radius-card: 12px;
    --ph-radius-btn: 10px;
    --ph-radius-lg: 16px;
    --ph-radius-xl: 20px;
    --ph-radius-full: 9999px;

    /* --- Shadows --- */
    --ph-shadow-card: 0 18px 48px rgba(22, 23, 29, 0.10);
    --ph-shadow-glow-crimson: 0 10px 22px rgba(215, 25, 32, 0.16);
    --ph-shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.06);
    --ph-shadow-md: 0 4px 12px rgba(15, 23, 42, 0.08);
    --ph-shadow-lg: 0 12px 32px rgba(15, 23, 42, 0.10);

    /* --- Typography --- */
    --ph-font-sans: 'Inter', system-ui, -apple-system, sans-serif;
    --ph-font-mono: 'JetBrains Mono', ui-monospace, monospace;
    --ph-text-xs: 11px;
    --ph-text-sm: 13px;
    --ph-text-base: 14px;
    --ph-text-md: 16px;
    --ph-text-lg: 18px;
    --ph-text-xl: 20px;
    --ph-text-2xl: 24px;
    --ph-text-3xl: 32px;
    --ph-leading-tight: 1.25;
    --ph-leading-normal: 1.5;
    --ph-leading-relaxed: 1.75;
    --ph-tracking-tight: -0.02em;
    --ph-tracking-normal: 0;
    --ph-tracking-wide: 0.025em;
    --ph-tracking-wider: 0.2em;

    /* --- Transitions --- */
    --ph-transition-fast: 150ms ease-out;
    --ph-transition-base: 200ms ease-out;
    --ph-transition-slow: 300ms ease-out;
    --ph-transition-spring: 400ms cubic-bezier(0.34, 1.56, 0.64, 1);

    /* --- Z-index scale --- */
    --ph-z-base: 1;
    --ph-z-dropdown: 100;
    --ph-z-sticky: 200;
    --ph-z-overlay: 300;
    --ph-z-modal: 400;
    --ph-z-toast: 500;

    /* --- Layout --- */
    --ph-sidebar-w: 260px;
    --ph-sidebar-w-collapsed: 72px;
    --ph-content-max: 1280px;
    --ph-auth-form-w: 440px;
  }

  /* ===== Dark Mode Overrides ===== */
  .dark {
    --ph-surface-deep: #0a0a0f;
    --ph-surface-base: #0e0e14;
    --ph-surface-card: #121218;
    --ph-surface-panel: #1a1a24;
    --ph-surface-input: #16161e;
    --ph-surface-elevated: #22222e;
    --ph-border-subtle: rgba(255, 255, 255, 0.06);
    --ph-border-default: rgba(255, 255, 255, 0.10);
    --ph-text-primary: #f5f5f7;
    --ph-text-secondary: #a1a1aa;
    --ph-text-muted: #71717a;
    --ph-text-inverse: #161616;
    --ph-shadow-card: 0 18px 48px rgba(0, 0, 0, 0.40);
    --ph-shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.20);
    --ph-shadow-md: 0 4px 12px rgba(0, 0, 0, 0.25);
    --ph-shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.35);
  }

  /* ===== Auth Focus Ring ===== */
  .ph-input-focus:focus {
    outline: none;
    border-color: rgba(215, 25, 32, 0.46);
    box-shadow:
      0 0 0 3px rgba(215, 25, 32, 0.10),
      0 1px 2px rgba(15, 23, 42, 0.06);
    background: #ffffff;
  }

  /* ===== Auth Inline Alert ===== */
  .ph-alert {
    padding: 12px 16px;
    border-radius: var(--ph-radius-input);
    font-size: 13px;
    line-height: 1.5;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    animation: authSlideDown 0.3s ease-out;
  }
  .ph-alert-error {
    background: rgba(255, 241, 241, 0.95);
    border: 1px solid rgba(215, 25, 32, 0.18);
    color: #9f121f;
  }
  .ph-alert-success {
    background: rgba(240, 253, 244, 0.95);
    border: 1px solid rgba(22, 163, 74, 0.18);
    color: #166534;
  }
  .ph-alert-warning {
    background: rgba(255, 251, 235, 0.95);
    border: 1px solid rgba(216, 137, 18, 0.22);
    color: #92400e;
  }

  /* ===== Custom Scrollbar (subtle) ===== */
  ::-webkit-scrollbar {
    width: 4px;
    height: 4px;
  }
  ::-webkit-scrollbar-track {
    background: transparent;
  }
  ::-webkit-scrollbar-thumb {
    background: rgba(0, 0, 0, 0.15);
    border-radius: 4px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: rgba(220, 38, 38, 0.4);
  }
  .dark ::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.10);
  }
  .dark ::-webkit-scrollbar-thumb:hover {
    background: rgba(220, 38, 38, 0.5);
  }

  /* ===== Selection Color ===== */
  ::selection {
    background-color: var(--ph-red-base);
    color: white;
  }

  /* ===== Auth Client Area Surface (Phase 4.15: light hosting x roleplay direction) ===== */
  .ph-auth-surface {
    background:
      radial-gradient(ellipse 70% 50% at 100% 0%, rgba(215, 25, 32, 0.08) 0%, transparent 58%),
      linear-gradient(180deg, #ffffff 0%, #fbf8f5 100%);
  }
  .ph-auth-accent-line {
    background: linear-gradient(90deg, rgba(215, 25, 32, 0.95) 0%, rgba(215, 25, 32, 0.95) 74%, rgba(216, 137, 18, 0.8) 100%);
  }

  /* ===== Inner Card Content Section (right panel) ===== */
  .ph-auth-panel-inner {
    background: rgba(255, 255, 255, 0.96);
    border: 1px solid rgba(15, 23, 42, 0.10);
    box-shadow:
      0 18px 44px rgba(22, 23, 29, 0.09),
      0 1px 2px rgba(22, 23, 29, 0.05);
  }

  /* ===== Eyebrow (kicker label) ===== */
  .ph-eyebrow {
    display: inline-flex;
    align-items: center;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ph-red-dark);
    line-height: 1;
  }

  /* ===== Primary CTA ===== */
  .ph-btn-primary {
    position: relative;
    overflow: hidden;
    background: linear-gradient(135deg, #ef2a2a 0%, var(--ph-red-base) 52%, var(--ph-red-dark) 100%);
    color: #ffffff;
    font-weight: 700;
    border-radius: 9px;
    transition: all 220ms cubic-bezier(0.2, 0.8, 0.2, 1);
    box-shadow:
      0 1px 0 rgba(255, 255, 255, 0.28) inset,
      0 -1px 0 rgba(0, 0, 0, 0.20) inset,
      0 10px 18px rgba(159, 18, 31, 0.18);
  }
  .ph-btn-primary::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 50%;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.12) 0%, rgba(255, 255, 255, 0) 100%);
    pointer-events: none;
  }
  .ph-btn-primary:hover:not(:disabled) {
    background: linear-gradient(135deg, #ff5a5f 0%, #d71920 48%, #b91422 100%);
    transform: translateY(-1px);
    box-shadow:
      0 1px 0 rgba(255, 255, 255, 0.18) inset,
      0 -1px 0 rgba(0, 0, 0, 0.18) inset,
      0 12px 24px rgba(159, 18, 31, 0.22);
  }
  .ph-btn-primary:disabled {
    opacity: 0.55;
    cursor: not-allowed;
  }

  /* ===== Status Pill ===== */
  .ph-status-pill {
    background: rgba(255, 255, 255, 0.92);
    border: 1px solid rgba(15, 23, 42, 0.10);
    box-shadow:
      0 10px 28px rgba(22, 23, 29, 0.06),
      0 1px 2px rgba(22, 23, 29, 0.04);
  }

  /* ===== Vignette backdrop for page ===== */
  .ph-page-vignette {
    background:
      radial-gradient(ellipse 80% 55% at 50% -10%, rgba(215, 25, 32, 0.07) 0%, transparent 62%),
      linear-gradient(180deg, #fbf8f5 0%, #f5f0ea 100%);
  }

  /* ===== Thin Scrollbar for Form Area (neutral) ===== */
  .ph-scroll-thin {
    scrollbar-width: thin;
    scrollbar-color: rgba(0, 0, 0, 0.15) transparent;
  }

  /* ===== Responsive Container ===== */
  .ph-container {
    width: 100%;
    margin-inline: auto;
    padding-inline: var(--ph-space-4);
    max-width: var(--ph-content-max);
  }
  @media (min-width: 768px) {
    .ph-container { padding-inline: var(--ph-space-6); }
  }
  @media (min-width: 1024px) {
    .ph-container { padding-inline: var(--ph-space-8); }
  }

  /* ===== Mobile-First Responsive Helpers ===== */
  /* Hide on mobile, show on >=md */
  .ph-hide-mobile { display: none; }
  @media (min-width: 768px) { .ph-hide-mobile { display: revert; } }

  /* Show on mobile, hide on >=md */
  .ph-show-mobile { display: revert; }
  @media (min-width: 768px) { .ph-show-mobile { display: none; } }

  /* Stack on mobile, row on >=md */
  .ph-stack-md-row {
    flex-direction: column;
  }
  @media (min-width: 768px) { .ph-stack-md-row { flex-direction: row; } }

  /* Full width on mobile, auto on >=md */
  .ph-w-full-md-auto {
    width: 100%;
  }
  @media (min-width: 768px) { .ph-w-full-md-auto { width: auto; } }

  /* Text size responsive scale */
  .ph-text-responsive-sm {
    font-size: var(--ph-text-xs);
  }
  @media (min-width: 640px) { .ph-text-responsive-sm { font-size: var(--ph-text-sm); } }
  @media (min-width: 768px) { .ph-text-responsive-sm { font-size: var(--ph-text-base); } }

  .ph-text-responsive-title {
    font-size: var(--ph-text-xl);
  }
  @media (min-width: 640px) { .ph-text-responsive-title { font-size: var(--ph-text-2xl); } }
  @media (min-width: 768px) { .ph-text-responsive-title { font-size: var(--ph-text-3xl); } }

  /* Safe area padding for notched devices */
  .ph-safe-bottom {
    padding-bottom: env(safe-area-inset-bottom);
  }
  .ph-safe-top {
    padding-top: env(safe-area-inset-top);
  }

  /* Prevent horizontal scroll on mobile */
  html, body {
    overflow-x: hidden;
    max-width: 100vw;
  }
</style>
</head>
  <body class="bg-[#fbf8f5] text-gray-900 antialiased transition-colors duration-300 selection:bg-red-500 selection:text-white">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
