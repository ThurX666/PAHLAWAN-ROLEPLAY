args = ["tools/mcp-pahlawan/dist/index.js"]
enabled = true
startup_timeout_sec = 30
tool_timeout_sec = 120

[mcp_servers.pahlawan_roleplay.env]
PROJECT_ROOT = "C:\\Users\\guyub\\Documents\\PAHLAWAN ROLEPLAY"
